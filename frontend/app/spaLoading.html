<div class="loader-wrapper">
  <img src="/hcq.png" alt="Logo" class="loader-logo">
  
  <div class="loader-circle"></div>
</div>

<style>
  .loader-wrapper {
    display: flex;
    flex-direction: column; /* Menyusun img dan loader secara vertikal */
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #ffffff; /* Bisa ganti ke #1a1a1a untuk dark mode */
    font-family: sans-serif;
  }

  .loader-logo {
    width: 200px; /* Sesuaikan ukuran logo */
    height: auto;
    margin-bottom: 20px; /* Jarak antara gambar dan circle */
    /* Opsional: Animasi muncul perlahan */
    animation: fadeIn 1.5s ease-in-out;
  }

  .loader-circle {
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3; /* Warna abu-abu pudar untuk latar belakang ring */
    border-top: 4px solid oklch(59.1% 0.293 322.896); /* Warna utama (contoh: hijau Nuxt) */
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
