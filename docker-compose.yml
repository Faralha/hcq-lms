services:
  postgres:
    image: postgres:18-alpine
    container_name: hcq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: hcq_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.0-alpine3.22
    container_name: hcq-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: hcq-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: hcq-gotenberg
    restart: unless-stopped
    expose:
      - "3000"

  init:
    image: ghcr.io/faralha/hcq-backend:latest
    container_name: hcq-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "npx prisma migrate deploy && node prisma/seed-demo.js"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/hcq_lms?schema=public
      DEMO_PENGAJAR_PASSWORD: ${DEMO_PENGAJAR_PASSWORD:-pengajar123}
      DEMO_PELAJAR_PASSWORD: ${DEMO_PELAJAR_PASSWORD:-pelajar123}
    restart: "no"

  backend:
    image: ghcr.io/faralha/hcq-backend:latest
    container_name: hcq-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/hcq_lms?schema=public
      JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret-for-dev-only-32chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-demo-refresh-secret-for-dev-only-32chars}
      FRONTEND_URL: http://localhost:${HTTP_PORT:-80}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: uploads
      GOTENBERG_ENDPOINT: http://gotenberg:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  frontend:
    image: ghcr.io/faralha/hcq-frontend:latest
    container_name: hcq-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: http://localhost:${API_PORT:-4000}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
